name: CI

# Corre los tests en cada push y pull request a main.
# Railway despliega desde main: si los tests fallan, el badge queda en
# rojo y se ve el error ANTES de que el equipo abra la app.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias de test
        # Solo lo necesario para los tests (no playwright ni el stack web
        # completo): mantiene el CI rápido (~30s).
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas numpy openpyxl

      - name: Correr tests
        run: pytest tests/ -v
