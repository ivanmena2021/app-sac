[theme]
# Solo fijamos el primaryColor (identidad MIDAGRI). Los demás colores
# se toman del tema activo — así el usuario puede cambiar entre claro
# y oscuro desde el menú Settings → Theme, y el CSS custom de
# shared/css.py adapta los componentes propios a cada modo.
primaryColor = "#2F5496"
font = "sans serif"

[server]
maxUploadSize = 50
